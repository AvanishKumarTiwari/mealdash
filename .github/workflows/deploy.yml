name: Build and Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fooddelivery-app:latest
            ${{ secrets.DOCKER_USERNAME }}/fooddelivery-app:v1

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/fooddelivery-app || mkdir -p /home/ubuntu/fooddelivery-app && cd /home/ubuntu/fooddelivery-app
            docker pull ${{ secrets.DOCKER_USERNAME }}/fooddelivery-app:latest
            docker stop fooddelivery-container || true
            docker rm fooddelivery-container || true
            docker run -d --name fooddelivery-container -p 6001:6001 \
              -e DB_HOST=your_db_host \
              -e DB_USER=your_db_user \
              -e DB_PASSWORD=your_db_password \
              -e DB_NAME=fooddelivery \
              ${{ secrets.DOCKER_USERNAME }}/fooddelivery-app:latest
