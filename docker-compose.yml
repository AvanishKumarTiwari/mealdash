version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: fooddelivery_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: fooddelivery
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./fooddelivery.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fooddelivery_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: fooddelivery_app
    ports:
      - "6001:6001"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_PORT: 3306
      DB_NAME: fooddelivery
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - fooddelivery_network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  fooddelivery_network:
    driver: bridge
